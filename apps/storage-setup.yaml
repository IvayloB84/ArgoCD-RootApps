apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-project-pv
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/media/theone/HDD/docker-files/github_projects/ArgoCD-RootApps"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: project-storage-pvc
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
