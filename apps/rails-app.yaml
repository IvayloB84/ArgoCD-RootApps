apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-app-deployment
  namespace: default
spec:
  replicas: 1 # Set to 1 for SQLite so two pods don't lock the same database file
  selector:
    matchLabels:
      app: rails-web
  template:
    metadata:
      labels:
        app: rails-web
    spec:
      containers:
      - name: rails-container
        image: docker.io/ivaylob84/rails-gallery:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        command: ["/bin/sh", "-c"]
        args:
          - |
            mkdir -p public/assets;
            bin/rails assets:precompile;
            cp app/assets/builds/tailwind.css public/assets/tailwind.css 2>/dev/null || true;
            bin/rails db:migrate;
            bundle exec rails server -b 0.0.0.0 -p 3000
        env:
        - name: RAILS_ENV
          value: "production"
        - name: RAILS_SERVE_STATIC_FILES
          value: "true"
        - name: RAILS_LOG_TO_STDOUT
          value: "true"
        - name: DATABASE_URL
          value: "sqlite3:/app/storage/production.sqlite3"
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: rails-production-secrets
              key: SECRET_KEY_BASE
        # Mounts the persistent disk block directly inside the container
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/storage
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: rails-sqlite-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rails-app-service
  namespace: default
spec:
  selector:
    app: rails-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rails-app-ingress
  namespace: default
  annotations:
    # Point directly to your standard HTTP entrypoint
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /rails
        pathType: Prefix
        backend:
          service:
            name: rails-app-service
            port:
              number: 80
---
# ADDED: Allocates a permanent 1GB local hard drive slice inside K3s
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rails-sqlite-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi