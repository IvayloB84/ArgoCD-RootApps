apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-app-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rails-web
  template:
    metadata:
      labels:
        app: rails-web
    spec:
      containers:
      - name: rails-container
        image: docker.io/ivaylob84/rails-gallery:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: RAILS_ENV
          value: "production"
        - name: RAILS_SERVE_STATIC_FILES
          value: "true"
        - name: RAILS_LOG_TO_STDOUT
          value: "true"
        - name: DATABASE_URL
          value: "sqlite3:/app/storage/production.sqlite3"
        # FIXED: Exact case-sensitive syntax matching Kubernetes validation specs
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: rails-production-secrets
              key: SECRET_KEY_BASE
---
apiVersion: v1
kind: Service
metadata:
  name: rails-app-service
  namespace: default
spec:
  selector:
    app: rails-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rails-app-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: default-strip-rails-prefix@kubernetes
spec:
  rules:
  - http:
      paths:
      - path: /rails
        pathType: Exact
        backend:
          service:
            name: rails-app-service
            port:
              number: 80