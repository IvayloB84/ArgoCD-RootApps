apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-app-deployment
  namespace: default
spec:
  revisionHistoryLimit: 2
  # HA CONFIGURATION: Always keep at least 2 active instances running across your nodes
  replicas: 2 
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1       # Spawns 1 new pod before killing any old pods
      maxUnavailable: 0 # Forces at least 2 pods to remain online under all conditions
  selector:
    matchLabels:
      app: rails-web
  template:
    metadata:
      labels:
        app: rails-web
    spec:
      initContainers:
      - name: volume-permissions-fix
        image: alpine:latest
        command: ["sh", "-c", "chown -R 1000:1000 /app/storage && chmod -R 775 /app/storage"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/storage
      containers:
      - name: rails-container
        image: docker.io/ivaylob84/rails-gallery:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        # READINESS PROBE: Tells Traefik to wait until Puma is fully loaded before routing users to it
        readinessProbe:
          httpGet:
            path: /rails/articles
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        command: ["/bin/sh", "-c"]
        args:
          - |
            bin/rails db:migrate;
            bundle exec rails server -b 0.0.0.0 -p 3000
        env:
        - name: RAILS_ENV
          value: "production"
        - name: RAILS_SERVE_STATIC_FILES
          value: "true"
        - name: RAILS_LOG_TO_STDOUT
          value: "true"
        - name: DATABASE_URL
          value: "sqlite3:/app/storage/production.sqlite3"
        - name: SECRET_KEY_BASE
          valueFrom:
            secretKeyRef:
              name: rails-production-secrets
              key: SECRET_KEY_BASE
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/storage
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          # CRITICAL NOTE: This PVC storage class must be updated to a ReadWriteMany provider (like NFS) 
          # so multiple pods can read/write to your sqlite database file at the same time.
          claimName: rails-sqlite-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rails-app-service
  namespace: default
spec:
  selector:
    app: rails-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rails-app-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rails-app-service
            port:
              number: 80
      - path: /assets
        pathType: Prefix
        backend:
          service:
            name: rails-app-service
            port:
              number: 80
      - path: /rails/active_storage
        pathType: Prefix
        backend:
          service:
            name: rails-app-service
            port:
              number: 80

