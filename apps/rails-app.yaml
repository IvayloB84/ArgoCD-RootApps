apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-app-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rails-web
  template:
    metadata:
      labels:
        app: rails-web
    spec:
      containers:
      - name: rails-container
        image: ruby:3.2-alpine
        # This raw loop runs a built-in lightweight network server on port 3000 that answers Traefik
        command: ["sh", "-c", "while true; do echo -e 'HTTP/1.1 200 OK\nContent-Type: text/html\n\n<h1>Welcome to your automated Ruby on Rails Sandbox Cluster!</h1>' | nc -l -p 3000; done"]
        ports:
        - containerPort: 3000
        env:
        - name: RAILS_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: rails-app-service
  namespace: default
spec:
  selector:
    app: rails-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rails-app-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - http:
      paths:
      - path: /rails
        pathType: Prefix
        backend:
          service:
            name: rails-app-service
            port:
              number: 80
