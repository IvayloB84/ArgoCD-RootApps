apiVersion: batch/v1
kind: CronJob
metadata:
  name: rails-sqlite-backup
  namespace: default
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
          - name: sqlite-backup-worker
            image: alpine:latest
            command:
            - /bin/sh
            - -c
            - |
              # Install sqlite3 package inside the worker container dynamically
              apk add --no-cache sqlite
              
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              DAY_OF_WEEK=$(date +%u)
              
              if [ "$DAY_OF_WEEK" -eq 6 ]; then
                PREFIX="weekly"
              else
                PREFIX="daily"
              fi
              
              TAR_NAME="${PREFIX}_archive_${TIMESTAMP}.tar.gz"
              TEMP_DIR="/tmp/backup_${TIMESTAMP}"
              mkdir -p ${TEMP_DIR}/media
              
              # FIXED: Forces SQLite to flush its memory logs directly onto disk before copying
              sqlite3 /app/storage/production.sqlite3 "PRAGMA wal_checkpoint(TRUNCATE);"
              cp /app/storage/production.sqlite3 ${TEMP_DIR}/production.sqlite3
              
              # Copies all active multi-layer two-character directory keys safely
              cp -a /app/storage/[0-9a-z][0-9a-z] ${TEMP_DIR}/media/ 2>/dev/null || true
              
              tar -czf /app/storage/${TAR_NAME} -C ${TEMP_DIR} .
              rm -rf ${TEMP_DIR}
              echo "Complete backup compiled successfully: ${TAR_NAME}"
              
              find /app/storage/ -name "daily_archive_*" -mtime +7 -delete
              find /app/storage/ -name "weekly_archive_*" -mtime +30 -delete
              echo "Storage optimization complete."
            volumeMounts:
            - name: sqlite-volume
              mountPath: /app/storage
          restartPolicy: OnFailure
          volumes:
          - name: sqlite-volume
            persistentVolumeClaim:
              claimName: rails-sqlite-pvc