apiVersion: batch/v1
kind: CronJob
metadata:
  name: rails-sqlite-backup
  namespace: default
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
          - name: sqlite-backup-worker
            image: alpine:latest
            command:
            - /bin/sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              DAY_OF_WEEK=$(date +%u)
              
              if [ "$DAY_OF_WEEK" -eq 6 ]; then
                PREFIX="weekly"
              else
                PREFIX="daily"
              fi
              
              TAR_NAME="${PREFIX}_archive_${TIMESTAMP}.tar.gz"
              
              # FIXED: Direct complete compression while cleanly avoiding loop recursion errors
              tar --exclude="*.tar.gz" --exclude="*.sqlite3-*" -czf /app/storage/${TAR_NAME} -C /app/storage .
              echo "Complete backup compiled successfully: ${TAR_NAME}"
              
              find /app/storage/ -name "daily_archive_*" -mtime +7 -delete
              find /app/storage/ -name "weekly_archive_*" -mtime +30 -delete
              echo "Storage optimization complete."
            volumeMounts:
            - name: sqlite-volume
              mountPath: /app/storage
          restartPolicy: OnFailure
          volumes:
          - name: sqlite-volume
            persistentVolumeClaim:
              claimName: rails-sqlite-pvc