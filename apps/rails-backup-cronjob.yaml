apiVersion: batch/v1
kind: CronJob
metadata:
  name: rails-sqlite-backup
  namespace: default
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
          - name: sqlite-backup-worker
            image: alpine:latest
            command:
            - /bin/sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              DAY_OF_WEEK=$(date +%u) # 6 is Saturday
              
              if [ "$DAY_OF_WEEK" -eq 6 ]; then
                PREFIX="weekly"
              else
                PREFIX="daily"
              fi
              
              TAR_NAME="${PREFIX}_archive_${TIMESTAMP}.tar.gz"
              TEMP_DIR="/tmp/backup_${TIMESTAMP}"
              
              # STEP 1: Create a temporary isolated workspace layout directory
              mkdir -p ${TEMP_DIR}/media
              
              # STEP 2: Copy the live database file safely
              cp /app/storage/production.sqlite3 ${TEMP_DIR}/production.sqlite3
              
              # STEP 3: Copy all active two-character Active Storage binary image directory hashes
              # Excludes existing backup tarballs or temporary files from bloating the copy
              find /app/storage/ -maxdepth 1 -type d -name "[0-9a-z][0-9a-z]" -exec cp -r {} ${TEMP_DIR}/media/ \;
              
              # STEP 4: Compress both data layers into a single high-utility archive file package
              tar -czf /app/storage/${TAR_NAME} -C ${TEMP_DIR} .
              
              # STEP 5: Clean up temporary workspace memory strings
              rm -rf ${TEMP_DIR}
              echo " Complete backup compiled successfully: ${TAR_NAME}"
              
              # SMART ROTATION: Delete daily archives older than 7 days
              find /app/storage/ -name "daily_archive_*" -mtime +7 -delete
              
              # LONG-TERM RETENTION: Delete weekly archives older than 30 days (Preserves your Saturdays!)
              find /app/storage/ -name "weekly_archive_*" -mtime +30 -delete
              echo " Volume disk storage space optimized cleanly."
            volumeMounts:
            - name: sqlite-volume
              mountPath: /app/storage
          restartPolicy: OnFailure
          volumes:
          - name: sqlite-volume
            persistentVolumeClaim:
              claimName: rails-sqlite-pvc