apiVersion: batch/v1
kind: CronJob
metadata:
  name: rails-sqlite-backup
  namespace: default
spec:
  # Scheduled to run automatically every single midnight
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
          - name: sqlite-backup-worker
            image: alpine:latest
            # Safe-copies the live production file with an explicit calendar date timestamp suffix
            command:
            - /bin/sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              DAY_OF_WEEK=$(date +%u) # 6 is Saturday
              
              if [ "$DAY_OF_WEEK" -eq 6 ]; then
                #  WEEKLY BACKUP: Saved with a special name prefix
                FILENAME="weekly_production_${TIMESTAMP}.sqlite3"
              else
                #  DAILY BACKUP: Saved with standard naming
                FILENAME="daily_production_${TIMESTAMP}.sqlite3"
              fi
              
              cp /app/storage/production.sqlite3 /app/storage/${FILENAME}
              echo " SQLite database backup created: ${FILENAME}"
              
              # SMART ROTATION: Delete daily backups older than 7 days
              find /app/storage/ -name "daily_production_*" -mtime +7 -delete
              
              # LONG-TERM RETENTION: Delete weekly backups older than 30 days (Preserves last Saturday!)
              find /app/storage/ -name "weekly_production_*" -mtime +30 -delete
              echo "Storage optimization complete."
            volumeMounts:
            - name: sqlite-volume
              mountPath: /app/storage
          restartPolicy: OnFailure
          volumes:
          - name: sqlite-volume
            persistentVolumeClaim:
              claimName: rails-sqlite-pvc