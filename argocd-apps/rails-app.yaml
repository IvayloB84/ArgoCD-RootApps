apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rails-gallery-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/IvayloB84/ArgoCD-RootApps'
    targetRevision: main
    path: rails-app-chart         # Points ONLY to your Rails 8 folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true          # This safely wipes out those 11 dead ReplicaSets automatically!
      selfHeal: true