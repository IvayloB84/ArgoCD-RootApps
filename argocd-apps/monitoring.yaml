apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-monitoring-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://prometheus-community.github.io/helm-charts'
    chart: kube-prometheus-stack
    targetRevision: '*'
    helm:
      values: |
        grafana:
          persistence:
            enabled: true
            storageClassName: "local-path"
            size: 2Gi
        alertmanager:
          alertmanagerSpec:
            # K3S ROOTLESS ALIGNMENT FOR ALERTMANAGER
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              fsGroup: 0
            alertmanagerConfigReloader:
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                runAsNonRoot: false
        prometheus:
          prometheusSpec:
            retention: 1d
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              fsGroup: 0
            prometheusConfigReloader:
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                runAsNonRoot: false
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: "local-path"
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    - Validate=false
    - SkipDryRunOnMissingResources=true
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
