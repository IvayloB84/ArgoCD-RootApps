apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-web-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com'
    targetRevision: main
    path: apps              # Points ONLY to your Nginx folder
  destination:
    server: 'https://default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true