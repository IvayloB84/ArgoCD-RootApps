name: Rails GitOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code files
      uses: actions/checkout@v4

    - name: Set up Docker Buildx engine
      uses: docker/setup-buildx-action@v3

    - name: Compile Rails Production Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./rails-app
        file: ./rails-app/Dockerfile
        push: false # We will switch this to true once you hook up your Docker Hub keys!
        tags: rails-gallery:latest
