apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/IvayloB84/ArgoCD-RootApps'
    targetRevision: HEAD
    path: apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
